<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <title>Datu aprēķins</title>
    <script>
        function aprekinat(rezultataLauks, lauksSekundes, vieniba) {
            let sekundes = parseFloat(document.getElementById(lauksSekundes).value);

            if (isNaN(sekundes) || sekundes <= 0) {
                alert("Ievadi korektu sekunžu skaitu!");
                return;
            }

            let atrums = 25 * 1000000; // 25 Mbps bitos
            let baiti = (atrums * sekundes) / 8;

            let rezultats;
            if (vieniba === "KB") {
                rezultats = baiti / 1000;
            } else {
                rezultats = baiti / 1024;
            }

            document.getElementById(rezultataLauks).value = rezultats.toFixed(2);
        }

        // notīra VISUS laukus
        function notiritVisu() {
            document.getElementById("sek1").value = "";
            document.getElementById("rez1").value = "";
            document.getElementById("sek2").value = "";
            document.getElementById("rez2").value = "";
        }
    </script>
</head>
<body>

<h2>1. aprēķins</h2>
<p>Aprēķināt cik daudz informācijas var lejupielādēt</p>

<input type="number" id="sek1" placeholder="Sekundes" onmouseover="notiritVisu()">
<br><br>

<label>
    <input type="radio" name="vieniba1" value="KB" checked> KB
</label>
<label>
    <input type="radio" name="vieniba1" value="KiB"> KiB
</label>

<br><br>

<button onclick="aprekinat('rez1','sek1', document.querySelector('input[name=vieniba1]:checked').value)">
    Aprēķināt
</button>

<br><br>

Atbilde:
<input type="text" id="rez1" readonly>


<hr>

<h2>2. aprēķins</h2>
<p>Aprēķināt cik daudz informācijas var lejupielādēt</p>

<input type="number" id="sek2" placeholder="Sekundes" onmouseover="notiritVisu()">
<br><br>

<label>
    <input type="radio" name="vieniba2" value="KB" checked> KB
</label>
<label>
    <input type="radio" name="vieniba2" value="KiB"> KiB
</label>

<br><br>

<button onclick="aprekinat('rez2','sek2', document.querySelector('input[name=vieniba2]:checked').value)">
    Aprēķināt
</button>

<br><br>

Atbilde:
<input type="text" id="rez2" readonly>

</body>
</html>
