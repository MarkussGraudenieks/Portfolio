<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<title>Baiti</title>
<style>
    body { font-family: Arial; }
    input { margin: 5px; }
</style>
</head>
<body>

<h3>Aprēķināt cik daudz informācijas var lejupielādēt</h3>

<form id="forma">

    <!-- Sekundes -->
    <input type="number" id="sekundes" placeholder="Sekundes"> sekundēs, ja interneta ātrums ir 25 Mbps.
    
    <br><br>

    <h4>Atbilde</h4>

    <!-- Atbilde -->
    <input type="text" id="rezultats" readonly>

    <!-- Radio pogas -->
    <label>
        <input type="radio" name="vieniba" value="KiB"> KiB
    </label>
    <label>
        <input type="radio" name="vieniba" value="KB"> KB
    </label>

    <br><br>

    <button type="button" onclick="aprekinat()">Aprēķināt</button>

</form>

<script>
function aprekinat() {
    let sek = document.getElementById("sekundes").value;
    let radios = document.getElementsByName("vieniba");
    let vieniba = "";

    for (let r of radios) {
        if (r.checked) {
            vieniba = r.value;
        }
    }

    if (sek === "" || vieniba === "") {
        alert("Ievadi datus!");
        return;
    }

    // 25 Mbps = 25,000,000 biti sekundē
    // /8 = baiti
    let biti = 25 * 1000000 * sek;
    let baiti = biti / 8;

    let rezultats;

    if (vieniba === "KB") {
        rezultats = baiti / 1000;
    } else {
        rezultats = baiti / 1024;
    }

    document.getElementById("rezultats").value = rezultats;
}

// 15. uzdevums – reset, kad fokusē ievadlaukā
document.getElementById("sekundes").addEventListener("focus", function() {
    document.getElementById("forma").reset();
});
</script>

</body>
</html>
