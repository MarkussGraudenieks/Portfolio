<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Aprēķins</title>
</head>
<body>

<p>Aprēķināt cik daudz informācijas var lejupielādēt</p>

<input type="number" id="sekundes" placeholder="Sekundes" oninput="aprekinat()">
<br><br>

<p>Atbilde:</p>
<input type="text" id="rezultats" readonly>
<br>

<label>
    <input type="radio" name="vieniba" value="KB" checked onchange="aprekinat()"> KB
</label>

<label>
    <input type="radio" name="vieniba" value="KiB" onchange="aprekinat()"> KiB
</label>

<script>
function aprekinat() {
    let s = document.getElementById("sekundes").value;

    if (s === "") {
        document.getElementById("rezultats").value = "";
        return;
    }

    // 25 Mbps → biti
    let biti = s * 25 * 1000000;

    // biti → baiti
    let baiti = biti / 8;

    let vieniba = document.querySelector('input[name="vieniba"]:checked').value;

    let rezultats;

    if (vieniba === "KB") {
        rezultats = baiti / 1000;
    } else {
        rezultats = baiti / 1024;
    }

    document.getElementById("rezultats").value = Math.round(rezultats);
}
</script>

</body>
</html>
