<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <title>TestWeb uzdevumi</title>
</head>
<body>

<h2>Aprēķini cik daudz informācijas var lejupielādēt</h2>

<form id="forma">

    Sekundes:
    <input type="number" id="sekundes"><br><br>

    Atbilde:
    <input type="text" id="rezultats" readonly><br><br>

    <input type="radio" name="vieniba" value="KiB"> KiB
    <input type="radio" name="vieniba" value="KB" checked> KB
    <br><br>

    <button type="button" onclick="aprekinat()">Aprēķināt</button>
    <button type="reset">Notīrīt</button>

</form>

<script>
function aprekinat() {
    let sekundes = document.getElementById("sekundes").value;

    // 25 Mbps → 3125 KB/s
    let kb = sekundes * 3125;

    let vienibas = document.getElementsByName("vieniba");
    let izvele;

    for (let i = 0; i < vienibas.length; i++) {
        if (vienibas[i].checked) {
            izvele = vienibas[i].value;
        }
    }

    let rezultats;

    if (izvele === "KiB") {
        rezultats = kb * 0.9765625; // KB → KiB
    } else {
        rezultats = kb;
    }

    document.getElementById("rezultats").value = rezultats;
}
</script>

</body>
</html>
